# Experiment Configuration
# Single behaviour (grammar_agreement) for end-to-end CSD3 testing

# Random seeds
seeds:
  prompt_generation: 42
  intervention_sampling: 456
  torch_seed: 789

# Model configuration
model:
  name: "Qwen/Qwen3-4B-Instruct-2507"
  revision: "main"
  dtype: "float32"      # Use float32 for CPU (bfloat16 is GPU-optimized)
  device: "cpu"         # Force CPU for initial testing
  max_length: 512
  trust_remote_code: true

# Behaviours
behaviours:
  grammar_agreement:
    train_size: 80
    test_size: 100
    min_logit_diff: 2.0
    success_threshold: 0.80
    description: "Subject-verb number agreement (singular/plural)"

  physics_scalar_vector_operator:
    train_size: 80
    test_size: 20
    min_logit_diff: 1.5
    success_threshold: 0.75
    description: "Classify operators/quantities as scalar vs vector (Type 3: Abstraction)"

  antonym_operation:
    train_size: 80
    test_size: 20
    min_logit_diff: 1.0
    success_threshold: 0.75
    description: "Predict the single-token antonym of an adjective (EN v0; Type 2: Candidate Set)"
    # 4 template variants × 25 EN pairs (forward-only) = 100 prompts (80 train, 20 test).
    # Correct/incorrect answers use leading space: ' large' / ' small'.
    # Tokenization audit 2026-03-01: all 25 EN pairs single-token with leading space.

  multilingual_antonym:
    train_size: 80
    test_size: 24
    min_logit_diff: 0.5
    success_threshold: 0.65
    description: "EN+FR antonym + EN synonym prompts for Anthropic multilingual circuits reproduction"
    # Pool: 104 prompts total (EN ant 36 + FR ant 32 + EN syn 36).
    # Tokenization audit 2026-03-04: 9/9 EN synonym pairs valid; 8/9 FR antonym pairs valid
    # (concept_idx=1 hot/cold excluded from FR: 'froid' tokenises as 2 tokens).
    # Three intervention axes: C1=operation swap, C2=operand swap (EN only), C3=language swap.
    # See scripts/b_tokenize_audit_multilingual.py for audit details.

  multilingual_circuits:
    train_size: 48
    test_size: 16
    min_logit_diff: 0.5
    success_threshold: 0.85
    description: "EN+FR concept-aligned antonym-only prompts for Anthropic multilingual circuits 1-to-1 reproduction"
    # 8 cross-language concepts (concept_idx=1 excluded: 'froid' = 2 tokens).
    # Stratified split: for each of 16 (concept_index, language) groups, 1 template → test,
    # 3 templates → train. → train=48 (24 EN + 24 FR), test=16 (8 EN + 8 FR).
    # Only C3 (language swap) patching: source=EN antonym, target=FR antonym, same concept.
    # Baseline gate: EN sign_accuracy ≥ 0.90, FR sign_accuracy ≥ 0.75,
    #   overall mean_norm_logprob_diff ≥ 1.0.
    # See scripts/b_tokenize_audit_multilingual.py for FR tokenization audit.

  multilingual_circuits_b1:
    train_size: 96
    test_size: 32
    min_logit_diff: 0.5
    success_threshold: 0.85
    description: "B1: EN+FR antonym prompts with 8 templates per concept (T0-T7), 96 train + 32 test"
    # Extends multilingual_circuits (T0-T3) with 4 new surface variants (T4-T7).
    # Same 8 cross-language concepts (concept_idx=1 excluded).
    # Stratified split: 2 test_tidxs + 6 train_tidxs per (concept, language) group.
    # Test_tidxs shared EN/FR per concept for C3 patching alignment.
    # → train=96 (48 EN + 48 FR), test=32 (16 EN + 16 FR).

  physics_conservation_pilot:
    train_size: 36
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.75
    description: "Pilot: 9 diagnostic concepts × 4 templates = 36 prompts (True/False, validation only)"
    # Run before full physics_conservation to validate format + model behaviour.
    # Gate: overall accuracy >= 0.75; adversarial results reported separately.

  physics_conservation_pilot_v3:
    train_size: 24
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.75
    description: "Pilot v3: 8 concepts × 3 Yes/No question templates = 24 prompts"
    # Reframed from True/False statement-verification to direct Yes/No questions.
    # Avoids systematic True-bias and conversational-follow-up failure modes.
    # Gate: overall >= 0.75; easy_acc (named forces) = 1.0; single-token ' Yes'/' No'.
    # If PASS: redesign full physics_conservation dataset with Yes/No format.

  physics_conservation:
    train_size: 150
    test_size: 50
    min_logit_diff: 0.5
    success_threshold: 0.80
    description: "Path independence of work: conservative vs non-conservative forces (Type 2: Candidate Set)"
    # 25 concept groups × 8 templates = 200 prompts total.
    # Binary: predict ' True' (path-independent) or ' False' (path-dependent).
    # Stratified split: T0-T5 → train (6 per concept = 150), T6-T7 → test (2 per concept = 50).
    # Concept families: conservative_named (14), nonconservative_named/abstract (8), adversarial (3).
    # Adversarial: C22=divergence_free (∇·F=0 ≠ ∇×F=0), C23=magnitude_only, C24=path_history.
    # Patching mode: paraphrase pairs (same concept_index, T_even ↔ T_odd).
    # Baseline gate: overall accuracy ≥ 0.80, mean_norm_logprob_diff ≥ 0.5.

# Activation capture
activations:
  layer_range: [15, 21]   # Middle layers: 15-20 (6 layers, matches transcoder_config middle range)
  token_positions: "last"
  batch_size: 2           # Smaller batch for CPU memory

# Transcoder settings
transcoder:
  model_size: "4b"
  config_file: "configs/transcoder_config.yaml"
  lazy_load: true

# Attribution graph
attribution:
  method: "gradient"
  top_k_edges: 10
  attribution_threshold: 0.01
  prune_nodes_min_edges: 2

# Intervention experiments
interventions:
  ablation:
    top_n_features: [1, 3, 5, 10]
    n_control_samples: 20

  patching:
    swap_token_positions: "subject"
    n_pairs: 40

# Paths
paths:
  prompts: "data/prompts"
  activations: "data/activations"
  results: "data/results"
  transcoders_cache: "~/.cache/transcoders"
  figures: "figures"

# Computational limits
compute:
  max_activation_memory_gb: 10
  use_cpu_if_no_gpu: true
  num_workers: 4
