# Experiment Configuration
# Single behaviour (grammar_agreement) for end-to-end CSD3 testing

# Random seeds
seeds:
  prompt_generation: 42
  intervention_sampling: 456
  torch_seed: 789

# Model configuration
model:
  name: "Qwen/Qwen3-4B-Instruct-2507"
  revision: "main"
  dtype: "float32"      # Use float32 for CPU (bfloat16 is GPU-optimized)
  device: "cpu"         # Force CPU for initial testing
  max_length: 512
  trust_remote_code: true

# Behaviours
behaviours:
  grammar_agreement:
    train_size: 80
    test_size: 100
    min_logit_diff: 2.0
    success_threshold: 0.80
    description: "Subject-verb number agreement (singular/plural)"

  physics_scalar_vector_operator:
    train_size: 80
    test_size: 20
    min_logit_diff: 1.5
    success_threshold: 0.75
    description: "Classify operators/quantities as scalar vs vector (Type 3: Abstraction)"

  antonym_operation:
    train_size: 80
    test_size: 20
    min_logit_diff: 1.0
    success_threshold: 0.75
    description: "Predict the single-token antonym of an adjective (EN v0; Type 2: Candidate Set)"
    # 4 template variants × 25 EN pairs (forward-only) = 100 prompts (80 train, 20 test).
    # Correct/incorrect answers use leading space: ' large' / ' small'.
    # Tokenization audit 2026-03-01: all 25 EN pairs single-token with leading space.

  multilingual_antonym:
    train_size: 80
    test_size: 24
    min_logit_diff: 0.5
    success_threshold: 0.65
    description: "EN+FR antonym + EN synonym prompts for Anthropic multilingual circuits reproduction"
    # Pool: 104 prompts total (EN ant 36 + FR ant 32 + EN syn 36).
    # Tokenization audit 2026-03-04: 9/9 EN synonym pairs valid; 8/9 FR antonym pairs valid
    # (concept_idx=1 hot/cold excluded from FR: 'froid' tokenises as 2 tokens).
    # Three intervention axes: C1=operation swap, C2=operand swap (EN only), C3=language swap.
    # See scripts/b_tokenize_audit_multilingual.py for audit details.

  multilingual_circuits:
    train_size: 48
    test_size: 16
    min_logit_diff: 0.5
    success_threshold: 0.85
    description: "EN+FR concept-aligned antonym-only prompts for Anthropic multilingual circuits 1-to-1 reproduction"
    # 8 cross-language concepts (concept_idx=1 excluded: 'froid' = 2 tokens).
    # Stratified split: for each of 16 (concept_index, language) groups, 1 template → test,
    # 3 templates → train. → train=48 (24 EN + 24 FR), test=16 (8 EN + 8 FR).
    # Only C3 (language swap) patching: source=EN antonym, target=FR antonym, same concept.
    # Baseline gate: EN sign_accuracy ≥ 0.90, FR sign_accuracy ≥ 0.75,
    #   overall mean_norm_logprob_diff ≥ 1.0.
    # See scripts/b_tokenize_audit_multilingual.py for FR tokenization audit.

  multilingual_circuits_b1:
    train_size: 96
    test_size: 32
    min_logit_diff: 0.5
    success_threshold: 0.85
    description: "B1: EN+FR antonym prompts with 8 templates per concept (T0-T7), 96 train + 32 test"
    # Extends multilingual_circuits (T0-T3) with 4 new surface variants (T4-T7).
    # Same 8 cross-language concepts (concept_idx=1 excluded).
    # Stratified split: 2 test_tidxs + 6 train_tidxs per (concept, language) group.
    # Test_tidxs shared EN/FR per concept for C3 patching alignment.
    # → train=96 (48 EN + 48 FR), test=32 (16 EN + 16 FR).

  physics_conservation_pilot:
    train_size: 36
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.75
    description: "Pilot: 9 diagnostic concepts × 4 templates = 36 prompts (True/False, validation only)"
    # Run before full physics_conservation to validate format + model behaviour.
    # Gate: overall accuracy >= 0.75; adversarial results reported separately.

  physics_conservation_pilot_v3:
    train_size: 24
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.75
    description: "Pilot v3: 8 concepts × 3 Yes/No question templates = 24 prompts"
    # Reframed from True/False statement-verification to direct Yes/No questions.
    # Avoids systematic True-bias and conversational-follow-up failure modes.
    # Gate: overall >= 0.75; easy_acc (named forces) = 1.0; single-token ' Yes'/' No'.
    # If PASS: redesign full physics_conservation dataset with Yes/No format.

  physics_decay_type:
    train_size: 108
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.90
    description: "B1 Phase 2: alpha vs beta decay classification (Type 1: Latent-state). Answer format: x_or_y."
    # Answers: ' alpha' (token 8287) / ' beta' (token 13440) — both single-token (audit 2026-04-08).
    # Phase 0 (5 prompts, alpha only): PASS 100%, mean_norm=1.39 (2026-04-09).
    # Phase 1: 24 prompts — 12 alpha (T0-T11) + 12 beta (T0-T11). Archived to _n24_pilot.jsonl.
    # Phase 2 (v2): 108 prompts — 54 alpha + 54 beta across families F0-F4.
    #   F0 (24): original pilot; F1 (28): keyword-free; F2 (20): nuclide pairs;
    #   F3 (20): phenomenological; F4 (16): mechanism/theory (difficulty=hard).
    # Circuit hypothesis: x → z_particle=(Z,A) → z_signature → y.
    # Gate: sign_accuracy >= 0.90, mean_norm_logprob_diff >= 0.5.

  physics_decay_type_probe:
    train_size: 470
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.85
    description: "Latent-state probing corpus for physics_decay_type. Three-level hierarchy: L1 atomic cues, L2 relations/processes, L3 concept-equivalence. Answer format: x_or_y."
    # Answers: ' alpha' (token 8287) / ' beta' (token 13440) — same tokens as physics_decay_type.
    # 470 prompts: 160 Level-1, 174 Level-2, 80 Level-3, 56 auxiliary.
    # Design: docs/latent_probing_corpus_phase2.md
    # Generator: scripts/generate_physics_decay_type_probe.py
    # Gate: sign_accuracy >= 0.85 (lower threshold; L3/auxiliary prompts are harder).

  physics_intensive_extensive:
    train_size: 5
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.90
    description: "B6 Phase 0: intensive vs extensive property classification (Type 3: Abstraction). Answer format: x_or_y."
    # Answers: ' intensive' (token 36195) / ' extensive' (token 16376) — both single-token (audit 2026-04-08).
    # Phase 0: 5 prompts, concept_index=0 only (temperature / intensive), 5 templates.
    # Circuit hypothesis: x → z_scaling_type ∈ {intensive, extensive} → y.
    # Gate: sign_accuracy >= 0.90, mean_norm_logprob_diff >= 0.5.
    # STATUS: RETIRED — Instruct model treats question format as reasoning task; base P(' intensive') ~10^-10.

  physics_gauge_equivalence:
    train_size: 24
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.90
    description: "B5 Phase 1: gauge equivalence classification — same vs different physics (Type 3: Abstraction). Completion format."
    # Answers: ' same' (token 1852) / ' different' (token 2155) — both single-token (audit 2026-04-09).
    # Phase 0 (5 prompts, gauge_equiv only): PASS 100%, mean_norm=14.01 (2026-04-09).
    # Phase 1: 24 prompts — 12 gauge_equivalent (same, T0-T11) + 12 gauge_inequivalent (different, T0-T11).
    # Circuit hypothesis: x → z_gauge_equiv ∈ {equivalent, inequivalent} → y.
    # Gate: sign_accuracy >= 0.90, mean_norm_logprob_diff >= 0.5.

  physics_e1_selection:
    train_size: 84
    test_size: 16
    min_logit_diff: 0.5
    success_threshold: 0.85
    description: "E1 electric dipole selection rule: allowed (Δl=±1) vs forbidden (Δl≠±1). Type 2: Selection Rule."
    # Answers: ' allowed' (token 5420) / ' forbidden' (token 36813) — both single-token (verified 2026-05-03).
    # 8 transition groups: sp,ps,pd,dp (allowed) + ss,pp,dd,sd (forbidden). Perfectly balanced 42/42.
    # 4 wording families: F1=orbital_name, F2=quantum_number, F3=standard_notation, F4=explicit_Δl.
    # Train: F1/F2/F3 v1-v3 + F4 all = 84 prompts. Test: F1/F3 v4 = 16 prompts.
    # Contrastive pairs: sp_vs_ss, pd_vs_pp, dp_vs_dd, sp_vs_sd.
    # Mechanistic hypothesis: model extracts l₁,l₂ → computes |Δl| → applies filter |Δl|=1.
    # Generator: scripts/30_generate_physics_e1_selection_prompts.py
    # Analysis: scripts/31_analyze_physics_e1_selection.py
    # Gate: sign_accuracy ≥ 0.85 overall; F4 (explicit Δl) ≥ 0.95; allowed_acc ≈ forbidden_acc.

  # ── Candidate-state large (2026-05-04) ──────────────────────────────────────
  physics_particle_candidate_selection:
    train_size: 311
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.90
    description: "Candidate-state: select particle from explicit set using filter. 4 experiments: core/distractor_sensitivity/counterfactual/set_size. Answers: particle names (1-tok)."
    # Generator: scripts/38_generate_candidate_state_large.py
    # Evaluator: scripts/39_evaluate_candidate_state.py (multi-candidate logprobs)
    # Analysis:  scripts/40_analyze_candidate_state.py (H1 vs H2, distractor sensitivity)
    # Key experiment: F5_no_set vs F1_explicit_list (same filter, different context)
    # → tests whether model uses explicit candidate set or retrieves directly

  # ── Internal candidate selection v2 — scaled 500 (2026-05-06) ──────────────
  physics_internal_candidate_selection_v2:
    train_size: 487
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.90
    description: "Internal candidate-state v2: NO explicit candidate list. Strategy B clean internal-only. 6 single-token filters (~447 prompts, main corpus) + 2 multi-token generalisation filters (40 prompts, placed last). Removed: beta_minus_charged_product, atomic_number_carrier. Redesigned: massless_em_mediator (6 F1 only)."
    # Generator: scripts/39_generate_internal_candidate_v2.py
    # Graph/interventions use --n_prompts 447 to exclude multi-token appendix
    # Correct answers: electron(80), proton(80), neutron(135), photon(152) + positron(20), muon(20)
    # explicit v3 (505 prompts) serves as the external explicit-list control

  # ── Internal candidate selection mini — pilot (2026-05-05) ─────────────────
  physics_internal_candidate_selection_mini:
    train_size: 122
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.80
    description: "Internal candidate-state mini: NO explicit candidate list. Model must activate implicit candidate pool from physics context. 10 filter/target pairs, 4 wording families. 18/122 multi-token (positron/muon — skipped by script 07)."
    # Generator: scripts/38_generate_internal_candidate_mini.py
    # Key distinction: explicit_candidate_set=false — more Anthropic-like

  # ── Candidate-state v3 — scaled 500 (2026-05-05) ───────────────────────────
  physics_particle_candidate_selection_v3:
    train_size: 505
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.90
    description: "Candidate-state v3: scaled to 505 prompts. Same 6 filters as v2. 14 core families/set (7F1+3F2+4F3), expanded distractor sensitivity, set-size for negative_charge+lepton."
    # Generator: scripts/38_generate_candidate_state_v3.py
    # Evaluator: scripts/39_evaluate_candidate_state.py
    # Analysis:  scripts/40_analyze_candidate_state.py

  # ── Candidate-state v2 — cleaned (2026-05-05) ──────────────────────────────
  physics_particle_candidate_selection_v2:
    train_size: 224
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.90
    description: "Candidate-state v2: cleaned set. Removed boson/heaviest/positive_charge. Restricted massless/neutral_charge distractor sets. 7 filter/target pairs × 5 families. Answers: particle names (1-tok)."
    # Generator: scripts/38_generate_candidate_state_v2.py
    # Evaluator: scripts/39_evaluate_candidate_state.py
    # Analysis:  scripts/40_analyze_candidate_state.py

  # ── Candidate-state pilot (2026-05-04) ──────────────────────────────────────
  physics_particle_candidate_selection_mini:
    train_size: 32
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.85
    description: "Pilot: candidate-state selection — 3-particle set + filter → selected particle. Answers: particle names (1-token)."
    # 8 base cases × 4 families = 32 prompts.
    # Filter properties: charge, lepton/boson type, rest mass, decay role.
    # Candidate ordering varies across families (positional balance).

  physics_decay_product_selection_mini:
    train_size: 32
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.85
    description: "Pilot: decay-product candidate selection — decay context + filter → selected product. Answers: electron/proton/neutron/positron (1-token)."
    # 8 decay cases (4×beta-minus, 4×beta-plus) × 4 families = 32 prompts.
    # antineutrino/neutrino appear in prompt text only (multi-token); never as answer tokens.

  # ── Round-3 candidate-set screening (2026-05-04) ────────────────────────────
  physics_spin_statistics_v3_mini:
    train_size: 32
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.90
    description: "Round-3: spin-statistics with F1 fix (gluon replaces pion) and F2 restricted to s∈{0,1,1/2,3/2}. Answers: ' boson'/' fermion'."
    # F2 vs F4 comparison: F2 (raw spin value) expected 75-87%; F4 (explicit integer label) expected 100%.
    # If F4>>F2: confirms numeral→integer classification is the symbolic rule bottleneck.

  chemistry_acid_base_mini:
    train_size: 32
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.90
    description: "Round-3: acid vs base (Brønsted-Lowry). Answers: ' acid'/' base' (single-token)."
    # 4 acids + 4 bases × 4 families = 32 prompts. Unique pH values (0,1,3,5 / 9,11,12,13).
    # F3=proton_transfer should approach 100% (textbook verbal rule). F2=pH threshold should be strong.

  physics_charge_sign_mini:
    train_size: 32
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.90
    description: "Round-3: electric charge sign (positive/negative). Answers: ' positive'/' negative' (single-token)."
    # 4 positive particles + 4 negative × 4 families = 32 prompts.
    # F4=charge_algebra tests explicit sum: (2/3 + 2/3 - 1/3 = +1) → positive.

  # ── Round-2 candidate-set screening (2026-05-04) ────────────────────────────
  physics_spin_statistics_v2_mini:
    train_size: 32
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.85
    description: "Round-2: spin-statistics with novel spin values (F2_novel) and hybrid prompts (F4). Answers: ' boson'/' fermion'."
    # 4 families: F1=particle_name, F2=novel_spin (hypothetical particles, s=3/2 etc.),
    # F3=spin_descriptor (textbook verbal), F4=hybrid (spin_value + explicit integer label).
    # Key comparison: F2 vs F4 localises the symbolic rule bottleneck.

  physics_relativistic_regime_v2_mini:
    train_size: 24
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.75
    description: "Round-2: classical vs relativistic regime, Yes/No framing. Answers: ' Yes'/' No'."
    # Fix for round-1 failure: ' classical' token prior dominated. Yes/No is symmetric.
    # Classical: v/c ∈ {0.001, 0.005, 0.01, 0.03}; Relativistic: v/c ∈ {0.7, 0.85, 0.95, 0.99}.

  physics_conductor_insulator_mini:
    train_size: 24
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.85
    description: "Round-2: conductor vs insulator, Yes/No framing. Answers: ' Yes'/' No'."
    # New behaviour. F1=named_material (recall), F2=conductivity_value (threshold), F3=band_structure (verbal).
    # Cross-family convergence test: do F1 and F2 activate same intermediate features?

  # ── Round-1 candidate-set screening mini-behaviours (screening only, no full pipeline) ──
  physics_parity_rule_mini:
    train_size: 32
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.85
    description: "Screening: orbital parity (even/odd) by (-1)^l rule. Answers: ' even'/' odd'."
    # 8 orbital instances (1s,3s,2p,4p,3d,5d,4f,5f) × 4 families = 32 prompts.
    # F1=orbital_name, F2=l_value, F3=spectroscopic_label, F4=context_sentence.
    # Rule: l even → even parity; l odd → odd parity.

  physics_spin_statistics_mini:
    train_size: 24
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.85
    description: "Screening: boson vs fermion by integer/half-integer spin. Answers: ' boson'/' fermion'."
    # 8 particles (4 bosons: photon/W/gluon/pion, 4 fermions: e/p/n/muon) × 3 families = 24 prompts.
    # F1=particle_name, F2=explicit_spin_value, F3=integer_descriptor.

  physics_approximation_regime_mini:
    train_size: 24
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.80
    description: "Screening: classical vs relativistic regime from v/c. Answers: ' classical'/' relativistic'."
    # 4 classical velocities (0.001c-0.02c) + 4 relativistic (0.7c-0.99c) × 3 families = 24 prompts.
    # F1=decimal_fraction, F2=percentage, F3=Lorentz_factor.

  physics_e1_selection_mini:
    train_size: 16
    test_size: 0
    min_logit_diff: 0.5
    success_threshold: 0.85
    description: "Screening: E1 selection rule (cross-shell only). Answers: ' allowed'/' forbidden'."
    # 8 cross-shell transitions (no same-n) × 2 families = 16 prompts.
    # F3=spectroscopic_notation, F4=explicit_delta_l.
    # Cross-shell only to remove same-n energy ambiguity.

  physics_conservation:
    train_size: 150
    test_size: 50
    min_logit_diff: 0.5
    success_threshold: 0.80
    description: "Path independence of work: conservative vs non-conservative forces (Type 2: Candidate Set)"
    # 25 concept groups × 8 templates = 200 prompts total.
    # Binary: predict ' True' (path-independent) or ' False' (path-dependent).
    # Stratified split: T0-T5 → train (6 per concept = 150), T6-T7 → test (2 per concept = 50).
    # Concept families: conservative_named (14), nonconservative_named/abstract (8), adversarial (3).
    # Adversarial: C22=divergence_free (∇·F=0 ≠ ∇×F=0), C23=magnitude_only, C24=path_history.
    # Patching mode: paraphrase pairs (same concept_index, T_even ↔ T_odd).
    # Baseline gate: overall accuracy ≥ 0.80, mean_norm_logprob_diff ≥ 0.5.

# Activation capture
activations:
  layer_range: [15, 21]   # Middle layers: 15-20 (6 layers, matches transcoder_config middle range)
  token_positions: "last"
  batch_size: 2           # Smaller batch for CPU memory

# Transcoder settings
transcoder:
  model_size: "4b"
  config_file: "configs/transcoder_config.yaml"
  lazy_load: true

# Attribution graph
attribution:
  method: "gradient"
  top_k_edges: 10
  attribution_threshold: 0.01
  prune_nodes_min_edges: 2

# Intervention experiments
interventions:
  ablation:
    top_n_features: [1, 3, 5, 10]
    n_control_samples: 20

  patching:
    swap_token_positions: "subject"
    n_pairs: 40

# Paths
paths:
  prompts: "data/prompts"
  activations: "data/activations"
  results: "data/results"
  transcoders_cache: "~/.cache/transcoders"
  figures: "figures"

# Computational limits
compute:
  max_activation_memory_gb: 10
  use_cpu_if_no_gpu: true
  num_workers: 4
